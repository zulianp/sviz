<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVIZ Monitor</title>
<style>
html, body { margin: 0; height: 100%; background: #101216; color: #e9edf2; font: 14px/1.4 system-ui, sans-serif; }
body { overflow: hidden; }
.layout { display: grid; grid-template-columns: 320px 1fr; height: 100%; min-width: 0; }
.sidebar { min-width: 0; background: #191d24; border-right: 1px solid #303742; display: grid; grid-template-rows: auto auto 1fr auto; }
.sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid #303742; }
.tree { min-height: 0; overflow: auto; padding: 8px; }
.viewer-pane { min-width: 0; min-height: 0; position: relative; }
canvas { display: block; width: 100%; height: 100%; touch-action: none; }
.tools { display: grid; grid-template-columns: 1fr 1fr 64px; gap: 8px; margin-top: 10px; }
.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
button { width: 100%; border: 0; border-radius: 4px; padding: 9px 10px; background: #2f80ed; color: white; font-weight: 600; cursor: pointer; }
.secondary { background: #28313d; color: #dce5ef; }
.danger { background: #8f2d2d; color: #fff; }
.tools button { margin-top: 0; background: #28313d; color: #dce5ef; }
.tools button.active { background: #2f80ed; color: #fff; }
.status { padding: 10px 14px 14px; color: #c7d0dc; font-size: 12px; min-height: 34px; border-top: 1px solid #303742; }
h1 { margin: 0 0 10px; font-size: 15px; font-weight: 700; }
details { border-radius: 4px; }
details + details { margin-top: 4px; }
summary { cursor: pointer; color: #f1f5f9; font-weight: 650; padding: 7px 8px; border-radius: 4px; list-style-position: inside; }
summary:hover { background: #222935; }
.message-list { display: grid; gap: 3px; padding: 2px 0 8px 18px; }
.message-item { background: transparent; color: #cbd5e1; text-align: left; font-weight: 500; padding: 6px 8px; border-radius: 4px; }
.message-item:hover { background: #242c38; }
.message-item.active { background: #2f80ed; color: #fff; }
.empty { color: #8792a2; padding: 10px 8px; font-size: 12px; }
@media (max-width: 760px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; }
  .sidebar { border-right: 0; border-bottom: 1px solid #303742; }
}
</style>
</head>
<body>
<main class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>SVIZ Monitor</h1>
      <div class="actions">
        <button id="refreshMonitor" type="button">Refresh Latest</button>
        <button id="clearMonitor" type="button" class="danger">Clear</button>
      </div>
      <div class="tools" aria-label="View controls">
        <button id="rotateMode" type="button" class="active">Rotate</button>
        <button id="panMode" type="button">Pan</button>
        <button id="resetView" type="button">Reset</button>
      </div>
    </div>
    <div class="tree" id="messageTree"></div>
    <div></div>
    <div class="status" id="status">Waiting for monitor data...</div>
  </aside>
  <section class="viewer-pane">
    <canvas id="view"></canvas>
  </section>
</main>
<script type="module" src="/monitor.js"></script>
</body>
</html>
